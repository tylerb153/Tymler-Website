{% extends "base.html" %}
{% load static %}

{% block title %}Music{% endblock %}
{% block head %}
    <link rel="stylesheet" href="{% static 'music.css' %}">
    {% comment %} <script src="{% static 'js/music.js' %}"></script> {% endcomment %}
{% endblock %}

{% block content %}
<div class="container-xxl py-3 justify-content-center">
    <div class="featured-img border border-black border-2 rounded-3 w-100 vh-100 position-relative" style="background-image: url({% if featuredSong.coverArt %}{{ featuredSong.coverArt.url }}{% else %}{% static 'images/NotFound.webp' %}{% endif %}">
        <div class ="position-absolute top-50 start-50 translate-middle">
            <h4>OUT NOW!</h4>
        </div>
    </div>
    <hr>
    <div class="container-fluid">
        <h2>More</h2>
        <div class='row gap-2 justify-content-center'>
            {% for song in songs %}
                <div class="music-tile border border-black border-2 rounded-3 position-relative" style="max-width: 426px;">
                    <img src="{% static 'images/NotFound.webp' %}" class="img-fluid">
                    <div class="d-flex position-absolute bottom-0 start-0 w-100 h-25 align-items-center" style="background: linear-gradient(transparent, rgba(0, 0, 0, .9));">
                        <h4 class="text-white mt-5 ms-2">Title</h4>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>

{% endblock %}
